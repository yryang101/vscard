<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>웹명함 카드</title>

  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>

<body>
  <main class="card">
    <div class="profile-img">
      <img src="03usagi.webp" alt="프로필 이미지" />
    </div>

    <h1 class="name">양예리</h1>
    <p class="role">사업 PM</p>
    <p class="status-message">
      유저 경험과 비즈니스 가치를 함께 고민하는 PM
    </p>

    <div class="info">
      <button type="button" class="info-item" data-copy="yryang@example.com">
        <span class="icon">✉️</span>
        <span>yryang@example.com</span>
      </button>

      <button type="button" class="info-item" data-copy="010-1234-5678">
        <span class="icon">☎️</span>
        <span>010-1234-5678</span>
      </button>

      <a class="info-link" href="https://github.com/yryang101" target="_blank">
        <span class="icon">💻</span>
        <span>My Github</span>
      </a>

      <a class="info-link" href="https://yryangportfolio.atoms.world" target="_blank">
        <span class="icon">✨</span>
        <span>My Portfolio</span>
      </a>
    </div>

    <p class="copy-message" id="copyMessage"></p>

    <p class="footer">Business Card</p>
  </main>
</body>
</html>
