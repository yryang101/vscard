<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>양예리 웹명함</title>

  <link rel="stylesheet" href="style.css?v=3" />
  <script src="script.js" defer></script>
</head>

<body>
  <main class="card">
    <div class="profile-img">
      <img src="03usagi.webp" alt="프로필 이미지" />
    </div>

    <h1 class="name">양예리</h1>
    <p class="role">사업 PM</p>

    <p class="status-message">
      데이터를 기반으로 유저 경험과 비즈니스 성장을 연결하는 PM
    </p>

    <div class="tags">
      <span class="tag">🎮 Game Business PM</span>
      <span class="tag">🤝 Communication</span>
      <span class="tag tag-wide">📊 Data-driven Thinking</span>
    </div>

    <div class="info">
      <button type="button" class="info-item" data-copy="yryang@example.com">
  <div class="info-content">
    <span class="info-label">EMAIL</span>
    <div class="info-main">
      <span class="icon">✉️</span>
      <span>yryang@example.com</span>
    </div>
  </div>
</button>

      <button type="button" class="info-item" data-copy="010-1234-5678">
  <div class="info-content">
    <span class="info-label">MOBILE</span>
    <div class="info-main">
      <span class="icon">📱</span>
      <span>010-1234-5678</span>
    </div>
  </div>
</button>

      <div class="link-row">
        <a class="info-link" href="https://github.com/yryang101" target="_blank">
          <span class="icon">💻</span>
          <span>Github</span>
        </a>

        <a class="info-link" href="https://yryangportfolio.atoms.world" target="_blank">
          <span class="icon">✨</span>
          <span>Portfolio</span>
        </a>
      </div>
    </div>

    <p class="copy-message" id="copyMessage"></p>

    <p class="footer">Business Card</p>
  </main>
</body>
</html>
